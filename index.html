<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase Form</title>
</head>
<body>

<h2>Отправка заявки</h2>

<!-- 🔐 Кнопки авторизации -->
<button id="loginBtn">Войти</button>
<button id="logoutBtn" style="display:none;">Выйти</button>

<br><br>

<!-- 📩 Форма -->
<form id="requestForm" style="display:none;">
    <input type="text" id="name" placeholder="Ваше имя" required><br><br>
    <input type="email" id="email" placeholder="Ваш email" required><br><br>
    <button type="submit">Отправить</button>
</form>

<h2>Лента заявок</h2>
<ul id="list"></ul>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        query,
        orderBy,
        updateDoc,
        doc,
        increment
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔐 Импорт авторизации
    import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        signOut,
        onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCNeJLw0sigQpd9tlVhC1Pe0CoSGHNO8SY",
        authDomain: "edlar-c576b.firebaseapp.com",
        projectId: "edlar-c576b",
        storageBucket: "edlar-c576b.firebasestorage.app",
        messagingSenderId: "443377138108",
        appId: "1:443377138108:web:c49bd24ca61ac287f513b9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const form = document.getElementById("requestForm");
    const list = document.getElementById("list");

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    // 🔑 Вход
    loginBtn.addEventListener("click", async () => {
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error("Ошибка входа:", error);
        }
    });

    // 🚪 Выход
    logoutBtn.addEventListener("click", async () => {
        await signOut(auth);
    });

    // 👀 Отслеживание состояния пользователя
    onAuthStateChanged(auth, (user) => {
        if (user) {
            form.style.display = "block";
            logoutBtn.style.display = "inline";
            loginBtn.style.display = "none";
        } else {
            form.style.display = "none";
            logoutBtn.style.display = "none";
            loginBtn.style.display = "inline";
        }
    });

    // ➕ Отправка формы
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;

        try {
            await addDoc(collection(db, "requests"), {
                name: name,
                email: email,
                likes: 0,
                createdAt: new Date()
            });

            form.reset();
        } catch (error) {
            console.error("Ошибка:", error);
        }
    });

    // 🔴 Живое обновление
    const q = query(
        collection(db, "requests"),
        orderBy("createdAt", "desc")
    );

    onSnapshot(q, (snapshot) => {
        list.innerHTML = "";

        snapshot.forEach((docItem) => {
            const data = docItem.data();

            const li = document.createElement("li");

            li.innerHTML = `
                <b>${data.name}</b> (${data.email})<br>
                👍 ${data.likes || 0}
                <button data-id="${docItem.id}">Лайк</button>
                <hr>
            `;

            li.querySelector("button").addEventListener("click", async () => {
                const ref = doc(db, "requests", docItem.id);

                await updateDoc(ref, {
                    likes: increment(1)
                });
            });

            list.appendChild(li);
        });
    });
</script>

</body>
</html>
