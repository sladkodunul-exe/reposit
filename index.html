<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Supabase Status App</title>
  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .buttons button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .green { background: #22c55e; }
    .yellow { background: #f59e0b; }
    .blue { background: #3b82f6; }
    .gray { background: #6b7280; }

    .user {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Мой профиль</h2>
  <p id="myInfo">Загрузка...</p>

  <div class="buttons">
    <button class="green" onclick="setStatus('Учусь', '#22c55e')">📚 Учусь</button>
    <button class="yellow" onclick="setStatus('Кофе', '#f59e0b')">☕ Кофе</button>
    <button class="blue" onclick="setStatus('В игре', '#3b82f6')">🎮 В игре</button>
    <button class="gray" onclick="setStatus('Дома', '#6b7280')">🏠 Дома</button>
  </div>
</div>

<div class="card">
  <h2>Монитор группы</h2>
  <div id="list"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// 🔑 ВСТАВЬ СВОИ ДАННЫЕ
const URL = https://rqslphzwqudnkpbuueem.supabase.co
const KEY = sb_publishable_x3kaGR-fIeWyl5CFggO4XQ_mSzLQfqa

const supabase = createClient(URL, KEY)

// ⚠️ ID пользователя (из таблицы profiles)
const MY_ID = 9f7b4d41-715c-4897-b4ea-56b255bf2934

// смена статуса
window.setStatus = async (text, color) => {
  const { error } = await supabase
    .from('profiles')
    .update({ status: text, color: color })
    .eq('id', MY_ID)

  if (error) {
    alert('Ошибка! Проверь RLS')
    console.error(error)
  } else {
    loadUsers()
  }
}

// загрузка пользователей
async function loadUsers() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .order('username', { ascending: true })

  if (error) return console.error(error)

  const list = document.getElementById('list')

  list.innerHTML = data.map(user => `
    <div class="user">
      <div class="dot" style="background:${user.color || '#ccc'}"></div>
      <div>
        <b>${user.username}</b><br>
        <small>${user.status || 'Статус не задан'}</small>
      </div>
    </div>
  `).join('')

  const me = data.find(u => u.id === MY_ID)
  if (me) {
    document.getElementById('myInfo').innerText =
      `Вы зашли как: ${me.username}`
  }
}

// автообновление
setInterval(loadUsers, 5000)

loadUsers()
</script>

</body>
</html>
